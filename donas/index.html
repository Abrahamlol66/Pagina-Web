<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Admin | ARBT Digital Enterprise</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <header class="header">
        <a href="../index.html" class="logo">
            <div class="logo-icon">A</div>
            <span>ARBT Digital Enterprise</span>
        </a>
    </header>

    <main class="contenedor">
        <div class="login-container">
            <div class="login-header">
                <div class="logo-icon">A</div>
                <h2>Acceso Administrativo</h2>
                <p style="color: var(--muted); font-size: 0.9rem;">Solo personal autorizado</p>
            </div>

            <div id="error-msg">Acceso denegado.</div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="admin@arbtdigital.com">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-login">Ingresar al Panel</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 ARBT Digital Enterprise. Todos los derechos reservados.</p>
    </footer>

    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/admin-auth.js"></script>
</body>
</html>
